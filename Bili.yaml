name: BiliBili每日等级任务
description: 定时任务及Cookie获取
compat_arguments:
  扫码Cookie: 'false'
  RunTime: 30 7 * * *
  APPCookie: 'true'
  bigPoint: 'false'
compat_arguments_schema:
  扫码Cookie:
    name: '[开关] 扫码Cookie'
    description: 是否启用此处修改
    default_value: 'false'
    options:
    - 'true'
    - 'false'
  RunTime:
    name: 自定义执行时间
    description: 可手动更改脚本运行时间，默认早上7点半
    default_value: 30 7 * * *
  APPCookie:
    name: '[开关] APPCookie'
    description: 是否启用此处修改
    default_value: 'true'
    options:
    - 'true'
    - 'false'
  bigPoint:
    name: '[开关] 观看剧集大积分'
    description: 是否启用此处修改
    default_value: 'false'
    options:
    - 'true'
    - 'false'
author: MartinsKing（@ClydeTime）
homepage: https://github.com/ClydeTime/BiliBili/tree/master
icon: https://raw.githubusercontent.com/ClydeTime/BiliBili/main/database/icon_Avatar.png
dns: {}
scriptings:
- schedule:
    name: B站每日等级任务
    cron: 30 7 * * *
    script_url: https://raw.githubusercontent.com/ClydeTime/BiliBili/main/js/BiliBiliDailyBonus.js
    timeout: 15
- schedule:
    name: B站观看剧集大积分
    cron: 41 7 * * *
    script_url: https://raw.githubusercontent.com/ClydeTime/BiliBili/main/js/BiliBiliDailyBonus.js
    timeout: 15
    disabled: true
- http_response:
    name: B站Cookie(扫码)
    match: ^https?:\/\/app\.bilibili\.com\/x\/resource\/fingerprint\?
    script_url: https://raw.githubusercontent.com/ClydeTime/BiliBili/main/js/BiliBiliDailyBonus.js
    timeout: 30
    disabled: true
- http_request:
    name: B站Cookie(APP)
    match: ^https?:\/\/app\.bilibili\.com\/x\/resource\/fingerprint\?
    script_url: https://raw.githubusercontent.com/ClydeTime/BiliBili/main/js/BiliBiliDailyBonus.js
    disabled: true
mitm:
  hostnames:
    includes:
    - app.bilibili.com
