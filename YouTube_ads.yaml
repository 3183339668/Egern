name: YouTubeAds
description: 移除YouTube视频、瀑布流、搜索和Shorts中的广告，移除底栏的Shorts按钮和上传按钮，增加画中画及字幕翻译功能。移除YouTube Music底栏的上传、选段和升级按钮，增加歌词翻译，支持二者的后台播放。此插件需要启用MitM over HTTP/2和QUIC回退保护。支持Premium订阅用户使用，不支持tvOS设备。
compat_arguments:
  blockUpload: 'true'
  blockShorts: 'true'
  blockImmersive: 'true'
  captionLang: zh-Hans
  lyricLang: zh-Hans
  debug: 'false'
compat_arguments_schema:
  blockUpload:
    name: 隐藏上传按钮
    description: 用于隐藏YouTube底栏的上传按钮
    default_value: 'true'
    options:
    - 'true'
    - 'false'
  blockShorts:
    name: 隐藏Shorts按钮
    description: 用于隐藏YouTube底栏的Shorts按钮
    default_value: 'true'
    options:
    - 'true'
    - 'false'
  blockImmersive:
    name: 隐藏选段按钮
    description: 用于隐藏YouTube Music底栏的选段按钮
    default_value: 'true'
    options:
    - 'true'
    - 'false'
  captionLang:
    name: 字幕翻译语言
    description: 需要把YouTube字幕翻译翻译为何种语言
    default_value: zh-Hans
    options:
    - zh-Hans
    - zh-Hant
    - ja
    - ko
    - en
    - off
  lyricLang:
    name: 歌词翻译语言
    description: 需要把YouTube Music字幕翻译翻译为何种语言
    default_value: zh-Hans
    options:
    - zh-Hans
    - zh-Hant
    - ja
    - ko
    - en
    - off
  debug:
    name: 启用调试模式
    description: 此插件的调试模式
    default_value: 'false'
    options:
    - 'true'
    - 'false'
author: Maasea, VirgilClyne, Choler, DivineEngine, app2smile
homepage: https://hub.kelee.one
icon: https://raw.githubusercontent.com/luestr/IconResource/main/App_icon/120px/YouTube.png
dns: {}
rules:
- and:
    match:
    - domain_suffix:
        match: googlevideo.com
    - protocol:
        match: QUIC
    policy: REJECT
- and:
    match:
    - domain_suffix:
        match: youtubei.googleapis.com
    - protocol:
        match: QUIC
    policy: REJECT
url_rewrites:
- match: ^https?:\/\/[\w-]+\.googlevideo\.com\/initplayback.+&oad
  location: http://reject-200/
  status_code: 200
scriptings:
- http_response:
    name: YouTube去广告
    match: ^https:\/\/youtubei\.googleapis\.com\/(youtubei\/v1\/(browse|next|player|search|reel\/reel_watch_sequence|guide|account\/get_setting|get_watch))(\?(.*))?$
    script_url: https://kelee.one/Resource/JavaScript/YouTube/YouTube_remove_ads/YouTube_remove_ads_response.js
    # 显式传递参数，确保通用转换器和各种客户端都能正确读取
    argument: blockUpload=true,blockShorts=true,blockImmersive=true,captionLang=zh-Hans,lyricLang=zh-Hans,debug=false
    env:
      _compat.$argument: '{"blockUpload":true,"blockShorts":true,"blockImmersive":true,"captionLang":"zh-Hans","lyricLang":"zh-Hans","debug":false}'
    body_required: true
    binary_body: true
mitm:
  hostnames:
    includes:
    - '*.googlevideo.com'
    - youtubei.googleapis.com