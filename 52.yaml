name: 吾爱破解
description: 吾爱破解签到与Cookie获取 (开关在下方的脚本列表中)
author: Yuheng0101
mitm:
  hostnames:
    includes:
      - www.52pojie.cn
scriptings:
  - http_request:
      name: 1.获取Cookie (用完请关闭)
      match: ^https:\/\/www\.52pojie\.cn\/home\.php\?
      script_url: https://raw.githubusercontent.com/Yuheng0101/X/main/Tasks/52pojie.js
      timeout: 10
      enabled: true
  - schedule:
      name: 2.定时签到
      cron: 0 9 * * *
      script_url: https://raw.githubusercontent.com/Yuheng0101/X/main/Tasks/52pojie.js
      timeout: 20
      enabled: true
