name: 吾爱破解 (整合版)
description: 自动签到与Cookie获取 (可在配置面板中开启/关闭)
author: Yuheng0101
compat_arguments:
  enableCookie: 'true'
  enableCheckin: 'true'
compat_arguments_schema:
  enableCookie:
    name: 开启Cookie获取
    default_value: 'true'
    options: ['true', 'false']
  enableCheckin:
    name: 开启定时签到
    default_value: 'true'
    options: ['true', 'false']
mitm:
  hostnames:
    includes:
      - www.52pojie.cn
scriptings:
  - http_request:
      name: 1.获取Cookie
      match: ^https:\/\/www\.52pojie\.cn\/
      script_url: https://raw.githubusercontent.com/Yuheng0101/X/main/Tasks/52pojie.js
      body_required: false
      timeout: 20
      env:
        _compat.$argument: '{"enableCookie":true}'
  - schedule:
      name: 2.定时签到
      cron: 0 9 * * *
      script_url: https://raw.githubusercontent.com/Yuheng0101/X/main/Tasks/52pojie.js
      timeout: 20
      env:
        _compat.$argument: '{"enableCheckin":true}'
