name: 吾爱破解
description: 自动签到与Cookie获取 (通过“配置”面板控制开关)
author: Yuheng0101
# 定义开关变量
compat_arguments:
  enableCookie: 'true'
  enableCheckin: 'true'
# 定义开关界面
compat_arguments_schema:
  enableCookie:
    name: 开启Cookie获取
    default_value: 'true'
    options: ['true', 'false']
  enableCheckin:
    name: 开启定时签到
    default_value: 'true'
    options: ['true', 'false']
mitm:
  hostnames:
    includes:
      - www.52pojie.cn
scriptings:
  - http_request:
      name: 1.获取Cookie
      match: ^https:\/\/www\.52pojie\.cn\/home\.php\?
      script_url: https://raw.githubusercontent.com/Yuheng0101/X/main/Tasks/52pojie.js
      timeout: 20
      # 关联开关变量
      env:
        _compat.$argument: '{"enableCookie":true}'
  - schedule:
      name: 2.定时签到
      cron: 0 9 * * *
      script_url: https://raw.githubusercontent.com/Yuheng0101/X/main/Tasks/52pojie.js
      timeout: 20
      # 关联开关变量
      env:
        _compat.$argument: '{"enableCheckin":true}'
