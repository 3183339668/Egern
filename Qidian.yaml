name: 起点读书签到
description: 支持多账号对于"起点读书App"的签到功能。已修正 Egern 兼容层响应体读取问题，保留全部 UI 可视化开关。
compat_arguments:
  CAPTURE_ENABLE: 'true'
  CRONEXP: 11 2 * * *
  QDREADER_DEBUG: 'false'
  TIMEOUT: '60'
  QDREADER_ADV_JOB_ENABLE: 'false'
  QDREADER_EXTRA_ADV_JOB_ENABLE: 'false'
  QDREADER_LOTTERY_ENABLE: 'false'
  QDREADER_WEEKLY_EXCHANGE_ENABLE: 'false'
  QDREADER_CHAPTER_CARD_ENABLE: 'false'
  QDREADER_MESSAGE_BOX_ENABLE: 'false'
compat_arguments_schema:
  CAPTURE_ENABLE:
    name: 是否开启抓取重写
    description: 是否开启抓取重写
    default_value: 'true'
    options:
    - 'true'
    - 'false'
  CRONEXP:
    name: CRONEXP
    description: 默认每天2点11分执行, 建议自行配置。
    default_value: 11 2 * * *
  QDREADER_DEBUG:
    name: 是否开启调试模式
    description: 是否开启调试模式
    default_value: 'false'
    options:
    - 'true'
    - 'false'
  TIMEOUT:
    name: 脚本执行超时时间, 默认60秒
    description: TIMEOUT
    default_value: '60'
  QDREADER_ADV_JOB_ENABLE:
    name: 激励任务
    description: 开启后执行激励碎片任务
    default_value: 'false'
    options:
    - 'true'
    - 'false'
  QDREADER_EXTRA_ADV_JOB_ENABLE:
    name: 每日任务
    description: 开启后执行每日广告任务
    default_value: 'false'
    options:
    - 'true'
    - 'false'
  QDREADER_LOTTERY_ENABLE:
    name: 每日抽奖
    description: 开启后执行每日抽奖
    default_value: 'false'
    options:
    - 'true'
    - 'false'
  QDREADER_WEEKLY_EXCHANGE_ENABLE:
    name: 每周兑换
    description: 开启后周日自动兑换章节卡
    default_value: 'false'
    options:
    - 'true'
    - 'false'
  QDREADER_CHAPTER_CARD_ENABLE:
    name: 章节卡片
    description: 开启后查询章节卡信息
    default_value: 'false'
    options:
    - 'true'
    - 'false'
  QDREADER_MESSAGE_BOX_ENABLE:
    name: 大咖荐书
    description: 开启后处理大咖荐书消息
    default_value: 'false'
    options:
    - 'true'
    - 'false'
compat_arguments_desc: "- 是否开启抓取重写: [\"起点读书\",\"#\"] \n\n- CRONEXP: 默认每天2点11分执行, 建议自行配置。\n\n- 是否开启调试模式: [\"true\",\"false\"]\n\n - TIMEOUT: 脚本执行超时时间, 默认60秒。\n\n- 激励任务: [\"true\",\"false\"]\n\n- 每日任务: [\"true\",\"false\"]\n\n- 每日抽奖: [\"true\",\"false\"]\n\n- 每周兑换: [\"true\",\"false\"]\n\n- 章节卡片: [\"true\",\"false\"]\n\n- 大咖荐书: [\"true\",\"false\"]"
icon: https://is1-ssl.mzstatic.com/image/thumb/Purple221/v4/97/40/5e/97405e49-87bb-3f0a-bf3a-91cf8fdf99a0/AppIcon-0-0-1x_U007epad-0-1-0-0-sRGB-GLES2_U002c0-85-220.png/144x144.png
dns: {}
scriptings:
- http_response:
    name: 起点读书获取Cookie
    match: ^https?:\/\/h5\.if\.qidian\.com\/argus\/api\/v1\/user\/getlogininfo
    script_url: https://raw.githubusercontent.com/Yuheng0101/X/main/Tasks/QDReader/qdreader.js
    env:
      _compat.$argument: '[{QDREADER_DEBUG}]'
    # 这里是修复的关键：同时写入双重参数，确保 Egern 兼容引擎能够成功强制读取 Body
    body_required: true
    requires_body: true
    timeout: 60
- schedule:
    name: 起点读书自动签到
    cron: '{CRONEXP}'
    script_url: https://raw.githubusercontent.com/Yuheng0101/X/main/Tasks/QDReader/qdreader.js
    env:
      _compat.$argument: '[{QDREADER_DEBUG},{QDREADER_ADV_JOB_ENABLE},{QDREADER_EXTRA_ADV_JOB_ENABLE},{QDREADER_LOTTERY_ENABLE},{QDREADER_WEEKLY_EXCHANGE_ENABLE},{QDREADER_CHAPTER_CARD_ENABLE},{QDREADER_MESSAGE_BOX_ENABLE}]'
    timeout: 60
mitm:
  hostnames:
    includes:
    - h5.if.qidian.com
