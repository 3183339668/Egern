name: "起点读书签到"
description: "修复 Cookie 并通过 Egern 原生参数传递开关状态。"
icon: "https://is1-ssl.mzstatic.com/image/thumb/Purple221/v4/97/40/5e/97405e49-87bb-3f0a-bf3a-91cf8fdf99a0/AppIcon-0-0-1x_U007epad-0-1-0-0-sRGB-GLES2_U002c0-85-220.png/144x144.png"

# 使用 Egern 原生参数语法，这才是真能传值的面板
parameters:
  - name: QDREADER_DEBUG
    type: boolean
    description: "调试模式"
    default: false
  - name: QDREADER_ADV_JOB_ENABLE
    type: boolean
    description: "激励任务"
    default: false
  - name: QDREADER_EXTRA_ADV_JOB_ENABLE
    type: boolean
    description: "每日任务"
    default: false
  - name: QDREADER_LOTTERY_ENABLE
    type: boolean
    description: "每日抽奖"
    default: false
  - name: QDREADER_WEEKLY_EXCHANGE_ENABLE
    type: boolean
    description: "每周兑换"
    default: false
  - name: QDREADER_CHAPTER_CARD_ENABLE
    type: boolean
    description: "章节卡片"
    default: false
  - name: QDREADER_MESSAGE_BOX_ENABLE
    type: boolean
    description: "大咖荐书"
    default: false

mitm:
  hostnames:
    - "h5.if.qidian.com"

scriptings:
  - name: "起点读书获取Cookie"
    type: http-response
    pattern: ^https?:\/\/h5\.if\.qidian\.com\/argus\/api\/v1\/user\/getlogininfo
    script_url: https://raw.githubusercontent.com/Yuheng0101/X/main/Tasks/QDReader/qdreader.js
    requires_body: true
    timeout: 60
    # 这里使用 Egern 的变量引用方式 {{变量名}}
    argument: "[{{QDREADER_DEBUG}}]"

  - name: "起点读书自动签到"
    type: cron
    cron: "11 2 * * *"
    script_url: https://raw.githubusercontent.com/Yuheng0101/X/main/Tasks/QDReader/qdreader.js
    timeout: 60
    # 确保变量名与 parameters 中定义的一一对应，Egern 会自动将其转为 true/false
    argument: "[{{QDREADER_DEBUG}},{{QDREADER_ADV_JOB_ENABLE}},{{QDREADER_EXTRA_ADV_JOB_ENABLE}},{{QDREADER_LOTTERY_ENABLE}},{{QDREADER_WEEKLY_EXCHANGE_ENABLE}},{{QDREADER_CHAPTER_CARD_ENABLE}},{{QDREADER_MESSAGE_BOX_ENABLE}}]"
